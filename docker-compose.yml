services:
  db:
    image: postgres:16
    container_name: pageturn-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Pageturn.API/Dockerfile
    container_name: pageturn-api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "5000:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pageturn-frontend
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  postgres_data:
